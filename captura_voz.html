<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Rosetta Stone | Mesh Decoupling v18</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-body: #0b0c10; --bg-panel: #16171b; --bg-input: #22242a;
            --border-color: #2a2c33; --accent-primary: #e60012; 
            --accent-hover: #ff1a2b; --accent-danger: #f04747; --accent-success: #00FFA3;
            --text-main: #f8f8f2; --text-muted: #8b8d96;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase; color: var(--accent-primary); letter-spacing: 1px;}
        .header p { margin: 0; color: var(--text-muted); font-size: 10px; letter-spacing: 2px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; width: 100%; max-width: 1600px; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .panel.highlight-layout { border: 2px solid var(--accent-primary); }
        .panel.highlight-bubble { border: 2px solid var(--accent-success); }
        .panel-title { font-size: 11px; font-weight: 800; color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 5px; text-transform: uppercase; }
        label { font-size: 10px; font-weight: 700; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        select, input[type="text"], input[type="password"] { width: 100%; padding: 6px 8px; font-size: 12px; border-radius: 4px; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-color); outline: none; box-sizing: border-box;}
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; height: 16px;}
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: var(--bg-input); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--accent-primary); margin-top: -5px; cursor: pointer; }
        .color-picker-group { display: flex; align-items: center; justify-content: space-between; background: var(--bg-input); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color);}
        input[type="color"] { border: none; width: 25px; height: 18px; cursor: pointer; background: none; padding: 0; }
        .toggle-group { display: flex; align-items: center; justify-content: space-between; background: var(--bg-input); padding: 5px 8px; border-radius: 4px; border: 1px solid var(--border-color);}
        .toggle-switch { position: relative; width: 28px; height: 14px; display: inline-block;}
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 14px; }
        .toggle-slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: var(--accent-primary); }
        input:checked + .toggle-slider:before { transform: translateX(14px); }
        .vu-meter { width: 100%; height: 4px; background: #000; border-radius: 2px; overflow: hidden; border: 1px solid var(--border-color); }
        .vu-bar { height: 100%; width: 0%; background: var(--accent-success); transition: width 0.1s ease; }
        button { padding: 12px; font-size: 12px; font-weight: 800; color: #fff; background: var(--accent-primary); border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        button.recording { background: var(--accent-danger); box-shadow: 0 0 10px rgba(240, 71, 71, 0.4); }
        .log-box { background: #000; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); min-height: 60px; }
        #original-log { color: #666; font-size: 10px; font-style: italic; border-bottom: 1px solid #111; padding-bottom: 3px; margin-bottom: 3px;}
        #translated-log { color: var(--accent-success); font-weight: 700; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header"><h1>Rosetta <span>Stone</span></h1><p>MESH DECOUPLING ENGINE v18.0</p></div>
    
    <div class="dashboard">
        <div class="panel">
            <div class="panel-title">1. Motor de Voz & IA</div>
            <label>Voz Original:</label>
            <select id="sourceLang">
                <option value="pt-BR">Português (Brasil)</option>
                <option value="en-US">Inglês (EUA)</option>
                <option value="es-419">Espanhol (LATAM)</option>
                <option value="ja-JP">Japonês</option>
            </select>
            <label>Tradução Alvo:</label>
            <select id="targetLang">
                <option value="en">Inglês</option>
                <option value="pt">Português (Brasil)</option>
                <option value="es">Espanhol</option>
                <option value="ja">Japonês</option>
            </select>
            <label>Mic Check:</label>
            <div class="vu-meter"><div class="vu-bar" id="vuBar"></div></div>
            <input type="password" id="cfgApiKey" placeholder="Gemini API Key..." style="margin-top:5px;">
            <button id="btnStart">Iniciar Captura</button>
            <button id="btnTest" style="background: #222; color: #00FFA3; border: 1px solid #00FFA3;">Forçar Teste no OBS</button>
            <div class="log-box"><div id="original-log">Aguardando...</div><div id="translated-log">-</div></div>
        </div>

        <div class="panel highlight-layout">
            <div class="panel-title">2. Janela Mestra (Limite da Tela)</div>
            <label>Posição X (%): <span id="valX">50%</span></label><input type="range" id="cfgPosX" min="0" max="100" value="50" oninput="upd('valX', this.value+'%')">
            <label>Posição Y (%): <span id="valY">90%</span></label><input type="range" id="cfgPosY" min="0" max="100" value="90" oninput="upd('valY', this.value+'%')">
            <label>Largura do Espaço (PX): <span id="valW">600px</span></label><input type="range" id="cfgBoxWidth" min="200" max="1920" value="600" oninput="upd('valW', this.value+'px')">
            <label>Altura do Espaço (PX): <span id="valH">300px</span></label><input type="range" id="cfgBoxHeight" min="50" max="1080" value="300" oninput="upd('valH', this.value+'px')">
            
            <label style="margin-top: 10px; color: var(--accent-primary);">Direção do Fluxo:</label>
            <select id="cfgTextFlow" onchange="sendDataManual()">
                <option value="column-reverse">Subir feito Log (Novas embaixo)</option>
                <option value="column">Descer feito Chat (Novas em cima)</option>
            </select>

            <div class="color-picker-group" style="margin-top:10px;"><label>Fundo da Janela</label><input type="color" id="cfgBgColor" value="#000000" onchange="sendDataManual()"></div>
            <label>Opacidade Janela: <span id="valBg">0%</span></label><input type="range" id="cfgBgOpacity" min="0" max="100" value="0" oninput="upd('valBg', this.value+'%')">
        </div>

        <div class="panel highlight-bubble">
            <div class="panel-title">3. Estilo & Dimensões da Bolha</div>
            <label>Estilo de cada Frase:</label>
            <select id="cfgBubbleStyle" onchange="sendDataManual()">
                <option value="persona">Persona 5 (Background PNG Nativo)</option>
                <option value="bubble">Speech Bubble Clássica</option>
                <option value="box">Bloco Sólido</option>
                <option value="plain">Texto Limpo (Sem Fundo)</option>
            </select>

            <label style="margin-top:10px;">Direção da Ponta (Apenas P5):</label>
            <select id="cfgPersonaTail" onchange="sendDataManual()">
                <option value="left">Ponta para Esquerda</option>
                <option value="right">Ponta para Direita</option>
            </select>

            <label style="margin-top:10px; color: var(--accent-success);">Largura Fixa da Bolha: <span id="valBubW">Automático</span></label>
            <input type="range" id="cfgBubW" min="0" max="1200" step="10" value="0" oninput="upd('valBubW', this.value == 0 ? 'Automático' : this.value+'px')">

            <label style="color: var(--accent-success);">Altura Fixa da Bolha: <span id="valBubH">Automático</span></label>
            <input type="range" id="cfgBubH" min="0" max="600" step="10" value="0" oninput="upd('valBubH', this.value == 0 ? 'Automático' : this.value+'px')">

            <label style="margin-top:5px;">Aumentar/Diminuir Fundo P5: <span id="valBubbleScale">1.0x</span></label>
            <input type="range" id="cfgBubbleScale" min="0.5" max="2.5" step="0.1" value="1.0" oninput="upd('valBubbleScale', this.value+'x')">
            
            <label style="margin-top:10px;">Histórico (0 = Limpa ao Falar): <span id="valHist">0</span></label>
            <input type="range" id="cfgHistoryLimit" min="0" max="10" value="0" oninput="upd('valHist', this.value)">

            <label>Tempo Pós-Fala (Segundos): <span id="valTime">6s</span></label>
            <input type="range" id="cfgDisplayTime" min="1" max="30" value="6" oninput="upd('valTime', this.value+'s')">

            <div class="color-picker-group" style="margin-top:10px;"><label>Cor Bolha Sólida</label><input type="color" id="cfgBubbleBgHex" value="#1a1a24" onchange="sendDataManual()"></div>
            <label>Opacidade Bolha Sólida: <span id="valBBg">90%</span></label><input type="range" id="cfgBubbleOp" min="0" max="100" value="90" oninput="upd('valBBg', this.value+'%')">
        </div>

        <div class="panel">
            <div class="panel-title">4. Formatação do Texto (Fine-Tuning)</div>
            <label>Família da Fonte:</label>
            <select id="cfgFontFamily" onchange="sendDataManual();">
                <option value="Arsenal">Arsenal (P5 +15% Largura)</option>
                <option value="Roboto">Roboto</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Anton">Anton</option>
                <option value="Bangers">Bangers</option>
            </select>

            <label style="margin-top:10px; color: var(--accent-success);">Tamanho da Fonte: <span id="valFontSize">2.2em</span></label>
            <input type="range" id="cfgFontSize" min="1.0" max="5.0" step="0.1" value="2.2" oninput="upd('valFontSize', this.value+'em')">
            
            <label style="margin-top:5px; color: var(--accent-success);">Largura Máx. do Texto (Quebra linha): <span id="valTextW">800px</span></label>
            <input type="range" id="cfgTextMaxWidth" min="100" max="1500" step="10" value="800" oninput="upd('valTextW', this.value+'px')">

            <label style="margin-top:10px; color: var(--accent-primary);">Mover Texto Eixo X (Direita/Esquerda): <span id="valTextOffsetX">0px</span></label>
            <input type="range" id="cfgTextOffsetX" min="-200" max="200" value="0" oninput="upd('valTextOffsetX', this.value+'px')">

            <label style="color: var(--accent-primary);">Mover Texto Eixo Y (Cima/Baixo): <span id="valTextOffsetY">0px</span></label>
            <input type="range" id="cfgTextOffsetY" min="-200" max="200" value="0" oninput="upd('valTextOffsetY', this.value+'px')">
            
            <div class="color-picker-group" style="margin-top:10px;"><label>Cor do Texto</label><input type="color" id="cfgFontColor" value="#ffffff" onchange="sendDataManual()"></div>
            
            <div class="color-picker-group" style="margin-top:5px;"><label>Cor Contorno (Stroke)</label><input type="color" id="cfgStrokeColor" value="#000000" onchange="sendDataManual()"></div>
            <label>Espessura Contorno: <span id="valStroke">2px</span></label><input type="range" id="cfgStrokeSize" min="0" max="10" value="2" oninput="upd('valStroke', this.value+'px')">

            <div class="toggle-group" style="margin-top:10px;"><label>Mostrar Voz Original</label><label class="toggle-switch"><input type="checkbox" id="cfgShowOriginal" checked onchange="sendDataManual()"><span class="toggle-slider"></span></label></div>
        </div>
    </div>

    <script>
        let ws, rec, isRec = false;
        let audioContext, analyser, microphoneStream;
        let isTranslating = false;
        let testCount = 1;

        const savedKey = localStorage.getItem('geminiKey');
        if (savedKey) document.getElementById('cfgApiKey').value = savedKey;
        document.getElementById('cfgApiKey').addEventListener('change', (e) => localStorage.setItem('geminiKey', e.target.value));

        function upd(id, val) { document.getElementById(id).innerText = val; sendDataManual(); }

        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8765');
            ws.onopen = () => console.log("WS Conectado");
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        async function startVUMeter() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphoneStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const mic = audioContext.createMediaStreamSource(stream);
                analyser.fftSize = 256;
                mic.connect(analyser);
                
                const data = new Uint8Array(analyser.frequencyBinCount);
                function updateVU() {
                    if (!isRec) return;
                    analyser.getByteFrequencyData(data);
                    const avg = data.reduce((a,b) => a+b) / data.length;
                    document.getElementById('vuBar').style.width = Math.min(avg * 3, 100) + '%';
                    requestAnimationFrame(updateVU);
                }
                updateVU();
            } catch (e) { console.error("Mic Erro:", e); }
        }

        async function transLit(txt) {
            if(!txt) return "";
            try {
                let sl = document.getElementById('sourceLang').value.split('-')[0];
                let tl = document.getElementById('targetLang').value;
                let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(txt)}`);
                let data = await res.json(); return data[0][0][0];
            } catch(e) { return txt; }
        }

        async function transAI(txt) {
            let key = document.getElementById('cfgApiKey').value.trim();
            if(!key) return await transLit(txt);
            let tgt = document.getElementById('targetLang').options[document.getElementById('targetLang').selectedIndex].text;
            try {
                let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: `Traduza para ${tgt} focando em dialogos de jogos: ${txt}`}]}]})
                });
                let data = await res.json(); return data.candidates[0].content.parts[0].text.trim();
            } catch(e) { return await transLit(txt); }
        }

        function sendData(orig, trans, isFinal) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Prepara as variaveis de Largura/Altura da Bolha
                let vBW = document.getElementById('cfgBubW').value;
                let vBH = document.getElementById('cfgBubH').value;

                ws.send(JSON.stringify({
                    orig: orig, trans: trans, isFinal: isFinal,
                    cfg: {
                        x: document.getElementById('cfgPosX').value,
                        y: document.getElementById('cfgPosY').value,
                        w: document.getElementById('cfgBoxWidth').value + 'px',
                        h: document.getElementById('cfgBoxHeight').value + 'px',
                        flow: document.getElementById('cfgTextFlow').value,
                        
                        boxBg: document.getElementById('cfgBgColor').value,
                        boxOp: document.getElementById('cfgBgOpacity').value / 100,
                        
                        bStyle: document.getElementById('cfgBubbleStyle').value,
                        pTail: document.getElementById('cfgPersonaTail').value,
                        
                        // DESACOPLAMENTO (O Segredo para a bolha não sumir)
                        bubW: vBW == 0 ? "fit-content" : vBW + "px",
                        bubH: vBH == 0 ? "fit-content" : vBH + "px",
                        bScale: document.getElementById('cfgBubbleScale').value,

                        hist: document.getElementById('cfgHistoryLimit').value,
                        time: document.getElementById('cfgDisplayTime').value * 1000,
                        
                        msgBg: document.getElementById('cfgBubbleBgHex').value,
                        msgOp: document.getElementById('cfgBubbleOp').value / 100,
                        
                        font: document.getElementById('cfgFontFamily').value,
                        fontC: document.getElementById('cfgFontColor').value,
                        strkC: document.getElementById('cfgStrokeColor').value,
                        strkS: document.getElementById('cfgStrokeSize').value + 'px',
                        fSize: document.getElementById('cfgFontSize').value + 'em',
                        tMaxW: document.getElementById('cfgTextMaxWidth').value + 'px',
                        tOffX: document.getElementById('cfgTextOffsetX').value + 'px',
                        tOffY: document.getElementById('cfgTextOffsetY').value + 'px',
                        
                        origOn: document.getElementById('cfgShowOriginal').checked
                    }
                }));
            }
        }

        function sendDataManual() { sendData("", "", false); }

        function sendTest() {
            sendData("You'll never see it coming!", "TESTE COM BOLHA DESACOPLADA [" + testCount + "]", true);
            testCount++;
        }
        
        document.getElementById('btnTest').addEventListener('click', sendTest);

        function setupRecognition() {
            if(!window.SpeechRecognition && !window.webkitSpeechRecognition) return;
            let Sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            rec = new Sr();
            rec.continuous = true; rec.interimResults = true;
            rec.onstart = () => { isRec=true; document.getElementById('btnStart').classList.add('recording'); document.getElementById('btnStart').innerText = "Parar Captura"; startVUMeter(); };
            rec.onend = () => { if(isRec) rec.start(); };
            rec.onresult = async (e) => {
                let cur = ''; let isF = false;
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    cur += e.results[i][0].transcript;
                    if (e.results[i].isFinal) isF = true;
                }
                document.getElementById('original-log').innerText = cur;
                
                if(!isF) {
                    if(!isTranslating) {
                        isTranslating = true;
                        transLit(cur).then(res => { sendData(cur, res, false); isTranslating = false; });
                    }
                }
                if(isF) {
                    document.getElementById('translated-log').innerText = "Processando IA...";
                    let tr = await transAI(cur);
                    document.getElementById('translated-log').innerText = tr;
                    sendData(cur, tr, true);
                }
            };
        }

        document.getElementById('btnStart').addEventListener('click', () => {
            if (!isRec) { rec.lang = document.getElementById('sourceLang').value; rec.start(); }
            else { isRec = false; rec.stop(); document.getElementById('btnStart').classList.remove('recording'); document.getElementById('btnStart').innerText = "Iniciar Captura"; if(microphoneStream) microphoneStream.getTracks().forEach(t=>t.stop()); }
        });

        connectWebSocket();
        setupRecognition();
    </script>
</body>
</html>
