<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Rosetta Stone Overlay v5.0</title>
    <style id="base-styles">
        body, html { background-color: transparent !important; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        
        #subtitle-container { 
            position: absolute; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            display: none; /* Controlado via JS */
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0px 8px 32px rgba(0,0,0,0.6); 
            box-sizing: border-box;
        }

        #bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.2; }
        #content-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; }

        .message-block { margin-bottom: 15px; flex-shrink: 0; }
        #translated-text { font-weight: 800; font-size: 2.3em; line-height: 1.1; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); width: 100%; word-wrap: break-word; }
        #original-text { color: rgba(255, 255, 255, 0.6); font-size: 1em; font-weight: 400; font-style: italic; margin-top: 10px; width: 100%; word-wrap: break-word; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }

        /* === KEYFRAME FX ENGINE (MANDATORY FOR OBS) === */
        
        /* FADE */
        .fade-in { animation: fadeInFX 0.5s forwards; }
        .fade-out { animation: fadeOutFX 0.5s forwards; }
        @keyframes fadeInFX { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOutFX { from { opacity: 1; } to { opacity: 0; } }

        /* SLIDE */
        .slide-in { animation: slideInFX 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        .slide-out { animation: slideOutFX 0.5s ease-in forwards; }
        @keyframes slideInFX { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideOutFX { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(40px); } }

        /* ZOOM */
        .zoom-in { animation: zoomInFX 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
        .zoom-out { animation: zoomOutFX 0.4s ease-in forwards; }
        @keyframes zoomInFX { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes zoomOutFX { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.5); } }

    </style>
</head>
<body id="obs-body">

    <div id="subtitle-container">
        <div id="bg-pattern"></div>
        <div id="content-wrapper"></div>
    </div>

    <script>
        const container = document.getElementById('subtitle-container');
        const bgPatternDiv = document.getElementById('bg-pattern');
        const contentWrapper = document.getElementById('content-wrapper');
        
        let hideTimeout;
        let messageHistory = [];

        const svgDict = {
            "waves1": "data:image/svg+xml,<svg width='40' height='40' xmlns='http://www.w3.org/2000/svg'><path d='M0 20 Q10 10 20 20 T40 20' fill='none' stroke='{c}' stroke-width='2'/></svg>",
            "shapes": "data:image/svg+xml,<svg width='60' height='60' xmlns='http://www.w3.org/2000/svg'><rect width='20' height='20' fill='{c}' opacity='0.5'/><circle cx='40' cy='40' r='10' fill='{c}'/></svg>",
            "hexagons": "data:image/svg+xml,<svg width='30' height='50' xmlns='http://www.w3.org/2000/svg'><path d='M15 0 L30 10 L30 30 L15 40 L0 30 L0 10 Z' fill='none' stroke='{c}'/></svg>",
            "stars": "data:image/svg+xml,<svg width='40' height='40' xmlns='http://www.w3.org/2000/svg'><path d='M20 2 L23 12 L33 12 L25 18 L28 28 L20 22 L12 28 L15 18 L7 12 L17 12 Z' fill='{c}'/></svg>"
        };

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function connectWebSocket() {
            const ws = new WebSocket('ws://localhost:8765');
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.config) {
                        // 1. POSICIONAMENTO E BOX FIXA
                        container.style.left = data.config.posX + "%";
                        container.style.top = data.config.posY + "%";
                        container.style.transform = `translate(-${data.config.posX}%, -${data.config.posY}%)`;
                        container.style.width = data.config.boxWidth;
                        container.style.height = data.config.boxHeight;
                        container.style.backgroundColor = hexToRgba(data.config.bgColorHex, data.config.bgOpacity);
                        container.style.border = data.config.showBorder ? `4px solid ${data.config.borderColor}` : "none";

                        // 2. GRAVIDADE
                        if (data.config.textFlow === 'bottom-to-top') contentWrapper.style.justifyContent = 'flex-end';
                        else if (data.config.textFlow === 'top-to-bottom') contentWrapper.style.justifyContent = 'flex-start';
                        else contentWrapper.style.justifyContent = 'center';

                        // 3. TEXTURAS
                        if (data.config.bgPattern !== "none" && svgDict[data.config.bgPattern]) {
                            const svg = svgDict[data.config.bgPattern].replace(/\{c\}/g, data.config.patternColor.replace('#', '%23'));
                            bgPatternDiv.style.backgroundImage = `url("${svg}")`;
                        } else { bgPatternDiv.style.backgroundImage = "none"; }

                        // 4. FONTES
                        if (data.config.fontFamily === 'Custom' && data.config.customFontBase64) {
                            let fNode = document.getElementById('dyn-font') || document.createElement('style');
                            fNode.id = 'dyn-font';
                            fNode.innerHTML = `@font-face { font-family: 'Custom'; src: url(${data.config.customFontBase64}); }`;
                            document.head.appendChild(fNode);
                        } else if (data.config.isGoogleFont) {
                            let gNode = document.getElementById('g-font') || document.createElement('link');
                            gNode.id = 'g-font'; gNode.rel = 'stylesheet';
                            gNode.href = `https://fonts.googleapis.com/css2?family=${data.config.fontFamily.replace(/ /g, '+')}:wght@800&display=swap`;
                            document.head.appendChild(gNode);
                        }
                    }

                    // 5. HISTÓRICO
                    if (data.isFinal && data.translated) {
                        messageHistory.push({ original: data.original, translated: data.translated });
                        if (messageHistory.length > 3) messageHistory.shift();
                    }

                    // RENDERIZAÇÃO
                    contentWrapper.innerHTML = "";
                    messageHistory.forEach((msg) => {
                        const block = document.createElement('div');
                        block.className = "message-block";
                        let originalHTML = data.config.showOriginal ? `<div id="original-text">${msg.original}</div>` : "";
                        block.innerHTML = `<div id="translated-text" style="font-family: ${data.config.fontFamily === 'Custom' ? 'Custom' : data.config.fontFamily}; color: ${data.config.fontColor};">${msg.translated}</div>${originalHTML}`;
                        contentWrapper.appendChild(block);
                    });

                    if (!data.isFinal && data.translated) {
                        const interim = document.createElement('div');
                        interim.className = "message-block";
                        interim.style.opacity = "0.7";
                        let originalHTML = data.config.showOriginal ? `<div id="original-text">${data.original}</div>` : "";
                        interim.innerHTML = `<div id="translated-text" style="font-family: ${data.config.fontFamily === 'Custom' ? 'Custom' : data.config.fontFamily}; color: ${data.config.fontColor};">${data.translated}</div>${originalHTML}`;
                        contentWrapper.appendChild(interim);
                    }

                    // TRIGGER FX (CONSERTO)
                    const inAnim = `${data.config.animType}-in`;
                    const outAnim = `${data.config.animType}-out`;

                    container.style.display = 'flex';
                    container.classList.remove(outAnim);
                    container.classList.add(inAnim);

                    clearTimeout(hideTimeout);
                    if (data.isFinal) {
                        hideTimeout = setTimeout(() => {
                            container.classList.remove(inAnim);
                            container.classList.add(outAnim);
                            setTimeout(() => { 
                                container.style.display = 'none'; 
                                messageHistory = []; 
                            }, 500);
                        }, data.config.displayTime);
                    }
                } catch (e) { console.error(e); }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }
        connectWebSocket();
    </script>
</body>
</html>
